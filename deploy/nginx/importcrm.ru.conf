# /etc/nginx/sites-available/importcrm.ru
# После копирования: ln -s ... sites-enabled/ && nginx -t && systemctl reload nginx
# SSL: certbot --nginx -d importcrm.ru -d www.importcrm.ru

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name importcrm.ru www.importcrm.ru _;

    client_max_body_size 100M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # HTTP по IP: убираем Secure у auth-token (иначе браузер не сохранит cookie)
        proxy_cookie_flags auth-token samesite=lax httponly;
    }
}
