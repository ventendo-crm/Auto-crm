# SSL от REG.RU — сертификаты в /etc/ssl/importcrm.ru/
# fullchain.pem = Сертификат + Корневой сертификат (склеить)
# privkey.pem   = Private Key

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name importcrm.ru www.importcrm.ru;

    ssl_certificate     /etc/ssl/importcrm.ru/fullchain.pem;
    ssl_certificate_key /etc/ssl/importcrm.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name importcrm.ru www.importcrm.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTP по IP (без редиректа на https)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_flags auth-token samesite=lax httponly;
    }
}
