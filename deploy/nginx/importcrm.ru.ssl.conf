# После certbot install — или подключите вручную, если install не сработал.
# Сертификаты: /etc/letsencrypt/live/importcrm.ru/

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name importcrm.ru www.importcrm.ru;

    ssl_certificate /etc/letsencrypt/live/importcrm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/importcrm.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name importcrm.ru www.importcrm.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
