# SSL storage — те же сертификаты REG.RU, что и для importcrm.ru
# /etc/ssl/importcrm.ru/fullchain.pem + privkey.pem

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name storage.importcrm.ru;

    ssl_certificate     /etc/ssl/importcrm.ru/fullchain.pem;
    ssl_certificate_key /etc/ssl/importcrm.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;
    ignore_invalid_headers off;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name storage.importcrm.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}
