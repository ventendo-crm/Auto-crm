#cloud-config
# Опциональный cloud-init для Timeweb Cloud при создании VPS.
# Вставьте в поле Cloud-init при создании сервера.

package_update: true
package_upgrade: true

packages:
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker root
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - mkdir -p /opt/auto-crm

final_message: |
  Cloud-init завершён. Загрузите проект в /opt/auto-crm и выполните deploy/scripts/deploy.sh
