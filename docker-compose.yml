services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: auto-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auto_crm
      POSTGRES_PASSWORD: auto_crm_secret
      POSTGRES_DB: auto_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_crm -d auto_crm"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - auto-crm-net

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auto-crm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - auto-crm-net

  # ─── MinIO (S3-compatible storage) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: auto-crm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - auto-crm-net

  # ─── Next.js App ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-crm-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://auto_crm:auto_crm_secret@postgres:5432/auto_crm?schema=public
      JWT_SECRET: change-me-to-a-long-random-secret-in-production
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_secret
      MINIO_BUCKET: auto-crm
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_REGION: us-east-1
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      RUN_SEED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - auto-crm-net

networks:
  auto-crm-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
